appId: com.jonathanluquet.drift
env:
  BINAURAL_TITLE: "BINAURAL BEATS"
  PRESETS_TITLE: "My Oasis"
---
- clearState
- launchApp:
    arguments:
      AppleLanguages: "(en)"
      AppleLocale: "en_US"
# Wait for app to be ready
- extendedWaitUntil:
    visible:
      id: "AppLogo"
    timeout: 30000

# Small pause for UI to settle
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 3000

# 1. Tap Shuffle 1 time
- tapOn: "Shuffle"
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 3000

# 2. Screenshot MainScreen1
- takeScreenshot: MainScreen1

# 3. Tap Shuffle 1 time
- tapOn: "Shuffle"
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 3000

# 4. Screenshot MainScreen2
- takeScreenshot: MainScreen2

# 5. Open Binaural Modal
- tapOn: "Waveform"

# Wait for binaural modal to appear using translated variable
- extendedWaitUntil:
    visible: "${BINAURAL_TITLE}"
    timeout: 5000

# 6. Toggle ON on the BINAURAL SOUND modal
- tapOn:
    id: "BinauralToggle"
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 3000

# 7. Screenshot BinauralScreen
- takeScreenshot: BinauralScreen

# 8. Close Binaural Modal
- tapOn:
    point: "50%, 10%"

# Wait for modal to close
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 3000

# 9. Open Presets Modal
- tapOn: "bookmark"

# Wait for presets modal to appear using translated variable
- extendedWaitUntil:
    visible: "${PRESETS_TITLE}"
    timeout: 5000

# 10. Screenshot Presets Modal (since selection closes it)
- takeScreenshot: PresetsModalScreen

# 11. Select the first preset
- tapOn:
    id: "preset_default_calm"

# Wait for modal to close
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 3000

# 12. Final screenshot (Main screen with preset active)
- takeScreenshot: FinalScreen
