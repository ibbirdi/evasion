appId: com.jonathanluquet.drift
---
# Wait for app to be ready
- extendedWaitUntil:
    visible: "Oasis"
    timeout: 20000

# Small pause for UI to settle
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 2000

# Tap Shuffle (Approx 30% from left, bottom of screen)
- tapOn:
    point: "30%, 93%"

# Pause for shuffle animation
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 1000

# Take main screenshot showing active mixer
- takeScreenshot: MainScreen

# Open Binaural Modal (approx 50% width, bottom)
- tapOn:
    point: "50%, 93%"

# Wait for binaural modal to appear using translated variable
- extendedWaitUntil:
    visible: "${BINAURAL_TITLE}"
    timeout: 5000
- takeScreenshot: BinauralScreen

# Close Binaural Modal by tapping empty space at top
- tapOn:
    point: "50%, 10%"

# Wait for modal to close
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 2000

# Open Presets Modal (approx 90% width, bottom)
- tapOn:
    point: "90%, 93%"

# Wait for presets modal to appear using translated variable
- extendedWaitUntil:
    visible: "${PRESETS_TITLE}"
    timeout: 5000
- swipe:
    start: "50%, 50%"
    end: "50%, 50%"
    duration: 2000
- takeScreenshot: PresetsScreen
